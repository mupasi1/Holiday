<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Holiday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #2B6CB0;
    --sky-bottom: #4F9FD8;
    --sand: #F2D29B;
    --coral: #FF7A59;
    --navy: #14213D;
    --cream: #FFF8F0;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Work Sans', sans-serif;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%, var(--sand) 100%);
    overflow-x: hidden;
    position: relative;
  }

  /* sun */
  .sun {
    position: absolute;
    top: 8%;
    right: 12%;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFE9A8, var(--coral));
    box-shadow: 0 0 60px 20px rgba(255, 200, 120, 0.55);
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* waves at base */
  .wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    line-height: 0;
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255, 248, 240, 0.92);
    backdrop-filter: blur(6px);
    border-radius: 28px;
    padding: 48px 40px 40px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(20, 33, 61, 0.25);
    max-width: 480px;
    width: 90%;
  }

  .eyebrow {
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    color: var(--navy);
    margin: 0 0 28px;
  }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .unit {
    background: var(--navy);
    color: var(--cream);
    border-radius: 16px;
    padding: 16px 14px;
    min-width: 76px;
  }

  .unit .num {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--sand);
  }

  .unit .label {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.8;
  }

  .target-date {
    margin-top: 26px;
    font-size: 0.95rem;
    color: var(--navy);
    opacity: 0.75;
  }

  .arrived {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.6rem;
    color: var(--coral);
    font-weight: 700;
  }

  @media (max-width: 420px) {
    .unit { min-width: 64px; padding: 12px 8px; }
    .unit .num { font-size: 1.7rem; }
    h1 { font-size: 1.6rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sun { animation: none; }
  }
</style>
</head>
<body>

  <div class="sun"></div>

  <svg class="wave" viewBox="0 0 1440 150" preserveAspectRatio="none">
    <path fill="#F2D29B" fill-opacity="0.9" d="M0,80 C240,140 480,20 720,60 C960,100 1200,40 1440,80 L1440,150 L0,150 Z"></path>
  </svg>

  <div class="card">
    <div class="eyebrow">Counting down to</div>
    <h1>Holiday Time 🌴</h1>
    <div class="countdown" id="countdown">
      <div class="unit"><div class="num" id="days">00</div><div class="label">Days</div></div>
      <div class="unit"><div class="num" id="hours">00</div><div class="label">Hours</div></div>
      <div class="unit"><div class="num" id="minutes">00</div><div class="label">Mins</div></div>
      <div class="unit"><div class="num" id="seconds">00</div><div class="label">Secs</div></div>
    </div>
    <div class="target-date" id="targetDate">Target: 21 July</div>
  </div>

<script>
  // Target date — 21 July, current or next occurrence
  function getTargetDate() {
    const now = new Date();
    let target = new Date(now.getFullYear(), 6, 21, 0, 0, 0); // month is 0-indexed, 6 = July
    if (target < now) {
      target = new Date(now.getFullYear() + 1, 6, 21, 0, 0, 0);
    }
    return target;
  }

  const target = getTargetDate();
  document.getElementById('targetDate').textContent =
    'Target: ' + target.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  function updateCountdown() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      document.getElementById('countdown').innerHTML = '<div class="arrived">It\'s here! 🎉</div>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById('days').textContent = String(days).padStart(2, '0');
    document.getElementById('hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
